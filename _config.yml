# Site wide configuration

title:            Conner Smith's Blog
locale:           en_US
url:              http://localhost:4000


# Jekyll configuration

permalink:   /:categories/:title/
markdown:    kramdown
highlighter: pygments
sass:
  sass_dir: _sass
  style: compressed
gems:
  - jekyll-sitemap

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  use_coderay: false


# Site owner
owner:
  name: Conner Smith
  avatar: conner.jpg
  bio: "Lover of sports, the Buffalo Bills, programming, and gaming. Unfortunately political and opinonated."
  email:
  disqus-shortname: connerpsmith
  twitter: x3igh7
  facebook: conner.smith.31
  google:
    plus: connerpsmith
    analytics:
    verify:
    ad-client:
    ad-slot:
