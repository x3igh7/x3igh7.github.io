  github: x3igh7
  stackoverflow: #http://stackoverflow.com/users/123456/username
  linkedin: connerpsmith
  instagram: #username
  lastfm: #username
  tumblr: #username
  pinterest: #username
  foursquare: #username
  steam: x3igh7
